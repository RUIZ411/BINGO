<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BKG Bingo V1</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar" id="topbar">
      <div class="brand">
        <span class="brand-mark">B</span>
        <div>
          <p class="eyebrow">BKG BINGO</p>
          <h1 id="pageTitle">오늘의 빙고</h1>
        </div>
      </div>

      <nav class="view-tabs" aria-label="화면 전환">
        <a href="?view=public" data-view-link="public">공개 화면</a>
        <a href="?view=obs" data-view-link="obs">OBS 화면</a>
        <a href="?view=admin" data-view-link="admin">관리자</a>
      </nav>
    </header>

    <main class="layout">
      <aside class="admin-panel" id="adminPanel" hidden>
        <section class="panel-card">
          <div class="panel-head">
            <h2>관리자 로그인</h2>
            <span id="loginStatus" class="status-pill">확인 중</span>
          </div>

          <div id="firebaseLoginBox" class="login-box" hidden>
            <label>
              이메일
              <input id="adminEmail" type="email" placeholder="admin@example.com" autocomplete="email" />
            </label>
            <label>
              비밀번호
              <input id="adminPassword" type="password" placeholder="Firebase Auth 비밀번호" autocomplete="current-password" />
            </label>
            <div class="row-buttons">
              <button id="loginBtn" class="primary-btn">로그인</button>
              <button id="logoutBtn" class="ghost-btn">로그아웃</button>
            </div>
          </div>

          <div id="localLoginBox" class="login-box" hidden>
            <label>
              로컬 관리자 PIN
              <input id="localPin" type="password" placeholder="기본값 1234" />
            </label>
            <div class="row-buttons">
              <button id="localLoginBtn" class="primary-btn">관리자 열기</button>
              <button id="localLogoutBtn" class="ghost-btn">잠금</button>
            </div>
            <p class="help-text">Firebase 설정 전에는 브라우저 로컬 저장소로만 동작합니다.</p>
          </div>
        </section>

        <section class="panel-card admin-only" data-admin-only>
          <div class="panel-head">
            <h2>빙고 생성</h2>
          </div>

          <label>
            빙고 제목
            <input id="titleInput" type="text" maxlength="40" />
          </label>

          <div class="two-col">
            <label>
              칸 수
              <select id="sizeSelect">
                <option value="5">5 × 5</option>
                <option value="7">7 × 7</option>
                <option value="10">10 × 10</option>
              </select>
            </label>
            <label>
              내용 타입
              <select id="typeSelect">
                <option value="mission">미션</option>
                <option value="number">숫자</option>
                <option value="alphabet">알파벳</option>
              </select>
            </label>
          </div>

          <div class="row-buttons wrap">
            <button id="createBoardBtn" class="primary-btn">빙고판 생성</button>
            <button id="shuffleBtn" class="ghost-btn">내용 랜덤 섞기</button>
            <button id="resetChecksBtn" class="ghost-btn danger-soft">체크 초기화</button>
          </div>
        </section>

        <section class="panel-card admin-only" data-admin-only>
          <div class="panel-head">
            <h2>치킨 수</h2>
            <span class="chicken-preview">🍗 <b id="chickenPreview">0</b></span>
          </div>
          <div class="counter-control">
            <button id="chickenMinusBtn" class="ghost-btn">-</button>
            <input id="chickenInput" type="number" min="0" step="1" value="0" />
            <button id="chickenPlusBtn" class="ghost-btn">+</button>
          </div>
        </section>

        <section class="panel-card admin-only" data-admin-only>
          <div class="panel-head">
            <h2>미션 일괄 입력</h2>
          </div>
          <textarea id="bulkText" class="bulk-text" placeholder="한 줄에 하나씩 입력하세요.\n예) 3킬 이상\n예) 수류탄 킬\n예) 차량 폭파"></textarea>
          <div class="row-buttons wrap">
            <button id="applyBulkBtn" class="primary-btn">현재 빙고판에 적용</button>
            <button id="clearBulkBtn" class="ghost-btn">입력칸 비우기</button>
          </div>
          <p class="help-text">입력 줄 수가 칸보다 적으면 남은 칸은 기존 내용이 유지됩니다.</p>
        </section>

        <section class="panel-card admin-only" data-admin-only>
          <div class="panel-head">
            <h2>전체 관리</h2>
          </div>
          <div class="row-buttons wrap">
            <button id="hardResetBtn" class="danger-btn">전체 초기화</button>
          </div>
          <p class="help-text">빙고판, 치킨 수, 완료 줄을 모두 초기 상태로 되돌립니다.</p>
        </section>
      </aside>

      <section class="stage" id="stage">
        <div class="score-strip">
          <div class="score-box">
            <span class="score-label">BINGO</span>
            <strong id="bingoCount">0</strong>
          </div>
          <div class="score-box chicken-box">
            <span class="score-label">🍗</span>
            <strong id="chickenCount">0</strong>
          </div>
          <div class="score-box small-score" id="maxBingoBox">
            <span class="score-label">MAX</span>
            <strong id="maxBingoCount">12</strong>
          </div>
        </div>

        <div class="board-wrap" id="boardWrap">
          <div id="bingoBoard" class="bingo-board" aria-label="빙고판"></div>
          <svg id="lineLayer" class="line-layer" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
          <div id="bingoOverlay" class="bingo-overlay" hidden>
            <span>BINGO!</span>
          </div>
        </div>

        <div id="cellEditorHelp" class="editor-help" hidden>
          칸 안의 내용을 수정하거나, 아래 버튼으로 지움/복구를 전환할 수 있어요.
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
